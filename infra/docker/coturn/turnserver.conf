# ─────────────────────────────────────────────────────────────
# Meetino — coturn (TURN/STUN) production config
#
# Why TURN matters: many users in Iran are behind symmetric NAT
# (carrier-grade mobile networks, restrictive home routers). Direct
# WebRTC P2P fails for them. coturn relays the media so the call
# still works, at the cost of extra bandwidth on the VPS.
#
# This file is mounted read-only at /etc/coturn/turnserver.conf.
# Replace the placeholders before starting the stack:
#   REPLACE_WITH_VPS_PUBLIC_IP        → your VPS's static IPv4
#   REPLACE_WITH_TURN_DOMAIN          → e.g. turn.meetino.example.com
#   REPLACE_WITH_TURN_SHARED_SECRET   → equal to LIVEKIT_TURN_SHARED_SECRET
#                                       in .env.production
#
# Open these ports in the host firewall:
#   3478/tcp + 3478/udp   STUN + plain TURN
#   5349/tcp + 5349/udp   TURN over TLS (optional but recommended)
#   49160-49200/udp       relay port range (matches min/max-port below)
# ─────────────────────────────────────────────────────────────

# ── Listening ────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Bind on all interfaces. coturn is on host networking so it sees the
# VPS's public IP directly.
listening-ip=0.0.0.0

# Tell clients which IP to dial back. REPLACE with your VPS public IP.
external-ip=REPLACE_WITH_VPS_PUBLIC_IP

# Range used for relayed media. Keep narrow on a single VPS — 40 slots
# is enough for ~40 concurrent calls' worth of relays at most.
min-port=49160
max-port=49200

# ── Auth ─────────────────────────────────────────────────────────────
# We use the long-term credential mechanism with a shared secret. LiveKit
# generates per-session (username, password) pairs signed by this same
# secret, and coturn validates them statelessly. NO username/password
# list in this file — that's by design.
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SHARED_SECRET
realm=meetino

# Refuse unauth requests outright. Stops random scanners from racking up
# the relay table.
no-auth-pings
no-multicast-peers
no-stdout-log

# ── TLS (only enabled if certs are mounted) ──────────────────────────
# Comment these out for plain-TURN-only deployments. If you do enable
# TLS, certbot can write into /etc/letsencrypt and you can symlink the
# files into /etc/coturn/ — see README.production.md.
#cert=/etc/letsencrypt/live/REPLACE_WITH_TURN_DOMAIN/fullchain.pem
#pkey=/etc/letsencrypt/live/REPLACE_WITH_TURN_DOMAIN/privkey.pem

# ── Hardening ────────────────────────────────────────────────────────
# Disable the legacy STUN-only behavior on a separate IP that exposed
# our address pool to scanners.
no-tlsv1
no-tlsv1_1
no-cli

# Quotas to keep abuse contained.
total-quota=200
user-quota=20

# Don't allow loopback or RFC1918 addresses in TURN allocations —
# closes a known SSRF-style relay exploit.
no-loopback-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# Verbose logs only while debugging.
# verbose

# Sane log location (host mounts /var/lib/coturn).
log-file=stdout
