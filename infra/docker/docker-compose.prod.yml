name: irno-platform-prod

# ─────────────────────────────────────────────────────────────────────────────
# Irno Platform — Single-VPS production deployment
#
# Services: postgres, redis, livekit, hub-api, hub-web, career-web,
#           meetino-api, meetino-web, nginx, certbot
#
# All application containers are internal-only (no host port exposure).
# Traffic arrives exclusively through the nginx reverse proxy on ports 80/443.
# Only livekit exposes host ports (7880–7882) for WebRTC media.
#
# Variable resolution (in priority order):
#   1. Shell environment  2. infra/docker/.env file  3. Compose defaults
#
# ── FIRST DEPLOY CHECKLIST ───────────────────────────────────────────────────
#   1. Copy .env.production.example files and fill in every CHANGE_ME / secret
#   2. Ensure DNS A records for hub.irno.ir, cv.irno.ir, meet.irno.ir are live
#   3. Build Docker images (see DEPLOYMENT.md §4)
#   4. docker compose -f infra/docker/docker-compose.prod.yml up -d postgres redis
#   5. Run prisma migrate deploy (one-shot container — see DEPLOYMENT.md §6)
#   6. Run db:seed once (see DEPLOYMENT.md §7)
#   7. docker compose -f infra/docker/docker-compose.prod.yml up -d nginx
#   8. Issue TLS certs (certbot certonly — see DEPLOYMENT.md §4 step 9)
#   9. docker compose -f infra/docker/docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

# Shared log-rotation config applied to every service
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: irno-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: irno_hub
      POSTGRES_USER: ${POSTGRES_USER:-irno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irno}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - irno_net

  redis:
    image: redis:7-alpine
    container_name: irno-redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - irno_net

  livekit:
    image: livekit/livekit-server:v1.8.4
    container_name: irno-livekit
    restart: unless-stopped
    logging: *default-logging
    command: ["--config", "/etc/livekit.yaml"]
    # LiveKit requires host port access for WebRTC media.
    # Ensure UDP 7882 is open in your VPS firewall (most common LiveKit failure).
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit/livekit.prod.yaml:/etc/livekit.yaml:ro
    networks:
      - irno_net

  # ── Application Layer ───────────────────────────────────────────────────────

  hub-api:
    image: irno-hub-api:latest
    container_name: irno-hub-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      # Database — use service name on irno_net; never localhost
      DATABASE_URL: "postgresql://${POSTGRES_USER:-irno}:${POSTGRES_PASSWORD}@postgres:5432/irno_hub?schema=public"
      # Redis — use service name; port 6379 is internal (no host mapping in prod)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_ACCESS_SECRET: ${HUB_JWT_ACCESS_SECRET:?HUB_JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${HUB_JWT_REFRESH_SECRET:?HUB_JWT_REFRESH_SECRET is required}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      # CORS — plural, comma-separated.  ⚠ The old key API_CORS_ORIGIN (singular) does NOT work.
      API_CORS_ORIGINS: "https://hub.irno.ir,https://cv.irno.ir"
      # App URLs (server-side; not baked at build time)
      CAREER_WEB_URL: https://cv.irno.ir
      IRNO_ID_BASE_URL: https://hub.irno.ir
      # PDF export — volume provides persistent storage across restarts
      EXPORT_STORAGE_PATH: /app/storage/exports
      PDF_EXPORT_ENABLED: ${PDF_EXPORT_ENABLED:-true}
      PDF_EXPORT_CONCURRENCY: ${PDF_EXPORT_CONCURRENCY:-2}
      PDF_EXPORT_QUEUE_MAX: ${PDF_EXPORT_QUEUE_MAX:-10}
      PDF_EXPORT_TIMEOUT_MS: ${PDF_EXPORT_TIMEOUT_MS:-30000}
      # OTP
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-120}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-60}
      # Notifications — set NOTIFICATION_SMS_PROVIDER to a real provider for production OTP
      NOTIFICATION_SMS_PROVIDER: ${NOTIFICATION_SMS_PROVIDER:-mock}
      NOTIFICATION_PUSH_PROVIDER: none
      NOTIFICATION_EMAIL_PROVIDER: none
      NOTIFICATION_TELEGRAM_PROVIDER: none
      # Meetino integration
      MEETINO_ENABLED: ${MEETINO_ENABLED:-false}
      MEETINO_WEB_URL: ${MEETINO_WEB_URL:-https://meet.irno.ir}
      MEETINO_API_URL: ${MEETINO_API_URL:-http://meetino-api:4001}
      MEETINO_CLIENT_SECRET: ${MEETINO_CLIENT_SECRET:-}
      MEETINO_ALLOWED_REDIRECT_URLS: ${MEETINO_ALLOWED_REDIRECT_URLS:-https://meet.irno.ir/auth/irno/callback}
      MEETINO_SSO_CODE_TTL_SECONDS: ${MEETINO_SSO_CODE_TTL_SECONDS:-60}
      MEETINO_OPEN_IN_NEW_TAB: ${MEETINO_OPEN_IN_NEW_TAB:-true}
      # ⚠ Super-admin seed vars — required only for first-deploy db:seed.
      # Remove from environment after the initial admin account is created.
      SUPER_ADMIN_MOBILE: ${SUPER_ADMIN_MOBILE:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
    volumes:
      # Persistent storage for Playwright-generated PDFs.
      # Mount point must match EXPORT_STORAGE_PATH above.
      - hub_pdf_exports:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irno_net

  hub-web:
    image: irno-hub-web:latest
    container_name: irno-hub-web
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      # Server-side runtime vars — these are NOT baked at build time.
      # NEXT_PUBLIC_* vars (e.g. NEXT_PUBLIC_CAREER_WEB_URL) must be
      # passed as --build-arg to docker build when building the image.
      HUB_API_URL: http://hub-api:4000
      HUB_API_INTERNAL_URL: http://hub-api:4000
      CAREER_WEB_URL: https://cv.irno.ir
    # No host port — nginx handles inbound traffic.
    depends_on:
      - hub-api
    networks:
      - irno_net

  career-web:
    image: irno-career-web:latest
    container_name: irno-career-web
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      # Server-side runtime var — NOT baked at build time.
      HUB_API_URL: http://hub-api:4000
    # No host port — nginx handles inbound traffic.
    depends_on:
      - hub-api
    networks:
      - irno_net

  meetino-api:
    image: irno-meetino-api:latest
    container_name: irno-meetino-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-irno}:${POSTGRES_PASSWORD}@postgres:5432/meetino_db?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_ACCESS_SECRET: ${MEETINO_JWT_ACCESS_SECRET:?MEETINO_JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${MEETINO_JWT_REFRESH_SECRET:?MEETINO_JWT_REFRESH_SECRET is required}
      API_PORT: "4001"
      WEB_ORIGIN: ${MEETINO_WEB_URL:-https://meet.irno.ir}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      LIVEKIT_URL: ${LIVEKIT_WS_URL:?LIVEKIT_WS_URL is required}
      IRNO_HUB_SSO_ENABLED: ${IRNO_HUB_SSO_ENABLED:-false}
      IRNO_HUB_API_URL: http://hub-api:4000
      IRNO_HUB_CLIENT_SECRET: ${MEETINO_CLIENT_SECRET:-}
      MEETING_MAX_PARTICIPANTS: ${MEETING_MAX_PARTICIPANTS:-50}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irno_net

  meetino-web:
    image: irno-meetino-web:latest
    container_name: irno-meetino-web
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
    # No host port — nginx handles inbound traffic.
    # Container listens on Next.js default port 3000 internally.
    depends_on:
      - meetino-api
    networks:
      - irno_net

  # ── Reverse Proxy + TLS ─────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: irno-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ../nginx/sites:/etc/nginx/sites:ro
      # Certbot ACME challenge webroot (shared with certbot service)
      - certbot_www:/var/www/certbot:ro
      # Let's Encrypt certificates (shared with certbot service)
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - hub-web
      - career-web
      - meetino-web
    networks:
      - irno_net

  # Certbot manages TLS certificate issuance and renewal.
  #
  # Initial cert issuance (run once before starting nginx with HTTPS):
  #   docker compose -f infra/docker/docker-compose.prod.yml run --rm certbot \
  #     certonly --webroot -w /var/www/certbot \
  #     -d hub.irno.ir -d cv.irno.ir -d meet.irno.ir \
  #     --email admin@irno.ir --agree-tos --non-interactive
  #
  # After issuing certs, restart nginx:
  #   docker compose -f infra/docker/docker-compose.prod.yml restart nginx
  #
  # Automatic renewal: the entrypoint runs certbot renew every 12 hours.
  # Add to host cron to reload nginx after renewal:
  #   0 */12 * * * docker exec irno-nginx nginx -s reload
  certbot:
    image: certbot/certbot:latest
    container_name: irno-certbot
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  hub_pdf_exports:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  irno_net:
    driver: bridge
