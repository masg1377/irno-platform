name: irno-platform-prod

# ─────────────────────────────────────────────────────────────────────────────
# Irno Platform — Single-VPS production deployment
#
# Architecture (Phase 10.7+):
#   Host Nginx (ports 80 / 443) — runs on the VPS, NOT inside Docker.
#   ├── platform.irnocollege.com   → 127.0.0.1:13000 (hub-web)
#   │                              → 127.0.0.1:14000 (hub-api, /api/)
#   ├── cv.irnocollege.com         → 127.0.0.1:13002 (career-web)
#   │                              → 127.0.0.1:14000 (hub-api, /api/)
#   ├── meet.irnocollege.com       → 127.0.0.1:13001 (meetino-web)
#   │   (socket.io WebSocket)      → 127.0.0.1:14001 (meetino-api, /socket.io/)
#   │                              → 127.0.0.1:14001 (meetino-api, /api/)
#   └── livekit.irnocollege.com    → 127.0.0.1:7880  (livekit WebSocket)
#
# All application containers bind to 127.0.0.1 only — host Nginx is the sole
# entry point for HTTP/HTTPS traffic.
#
# LiveKit WebRTC media ports (7881/tcp, 7882/udp) are published on ALL
# interfaces — they must be publicly reachable for WebRTC to work.
#
# PostgreSQL and Redis are internal-only — no host ports exposed.
#
# TLS is handled entirely by host Nginx + Certbot (NOT Docker certbot).
# See: infra/host-nginx/sites/  and  DEPLOYMENT.md §4.
#
# Variable resolution:
#   1. Shell environment  2. infra/docker/.env.prod  3. Compose defaults
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: irno-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: irno_hub
      POSTGRES_USER: ${POSTGRES_USER:-irno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irno}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - irno_net
    # No host port — internal Docker network only.

  redis:
    image: redis:7-alpine
    container_name: irno-redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - irno_net
    # No host port — internal Docker network only.

  livekit:
    image: livekit/livekit-server:v1.8.4
    container_name: irno-livekit
    restart: unless-stopped
    logging: *default-logging
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      # API / WebSocket — localhost-only.
      # Host Nginx (livekit.irnocollege.com) proxies to this port.
      - "127.0.0.1:7880:7880"
      # WebRTC media — must be publicly accessible on ALL interfaces.
      # ⚠️  Ensure UDP 7882 is open in the VPS firewall — most common LiveKit failure.
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      # Real config lives OUTSIDE the repository at /opt/irno/secrets/livekit.prod.yaml.
      # Generated by first-deploy.sh from .env.prod values. Never committed to git.
      # Template: infra/docker/livekit/livekit.prod.yaml.example
      - /opt/irno/secrets/livekit.prod.yaml:/etc/livekit.yaml:ro
    networks:
      - irno_net

  # ── Application Layer ───────────────────────────────────────────────────────

  hub-api:
    image: irno-hub-api:latest
    container_name: irno-hub-api
    restart: unless-stopped
    logging: *default-logging
    ports:
      # localhost-only — host Nginx proxies /api/ to this port.
      - "127.0.0.1:14000:4000"
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      # Database — use service name on irno_net; never localhost.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-irno}:${POSTGRES_PASSWORD}@postgres:5432/irno_hub?schema=public"
      # Redis — service name; port 6379 is internal (no host mapping).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_ACCESS_SECRET: ${HUB_JWT_ACCESS_SECRET:?HUB_JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${HUB_JWT_REFRESH_SECRET:?HUB_JWT_REFRESH_SECRET is required}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      # CORS — plural, comma-separated.
      # ⚠️  API_CORS_ORIGIN (singular) is WRONG and silently ignored.
      # All three browser origins (platform + cv + meet) must be listed.
      API_CORS_ORIGINS: "https://platform.irnocollege.com,https://cv.irnocollege.com,https://meet.irnocollege.com"
      # App URLs (server-side runtime vars — not baked at build time)
      CAREER_WEB_URL: https://cv.irnocollege.com
      IRNO_ID_BASE_URL: https://platform.irnocollege.com
      # PDF export — persistent volume provides storage across restarts
      EXPORT_STORAGE_PATH: /app/storage/exports
      PDF_EXPORT_ENABLED: ${PDF_EXPORT_ENABLED:-true}
      # 1 Chromium process. 4 GB RAM VPS — Chromium uses ~200 MB per page.
      PDF_EXPORT_CONCURRENCY: ${PDF_EXPORT_CONCURRENCY:-1}
      PDF_EXPORT_QUEUE_MAX: ${PDF_EXPORT_QUEUE_MAX:-3}
      PDF_EXPORT_TIMEOUT_MS: ${PDF_EXPORT_TIMEOUT_MS:-30000}
      # OTP
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-120}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-60}
      # Notifications
      NOTIFICATION_SMS_PROVIDER: ${NOTIFICATION_SMS_PROVIDER:-mock}
      NOTIFICATION_PUSH_PROVIDER: none
      NOTIFICATION_EMAIL_PROVIDER: none
      NOTIFICATION_TELEGRAM_PROVIDER: none
      # Meetino integration
      MEETINO_ENABLED: ${MEETINO_ENABLED:-true}
      MEETINO_WEB_URL: ${MEETINO_WEB_URL:-https://meet.irnocollege.com}
      # Server-to-server — internal compose network
      MEETINO_API_URL: ${MEETINO_API_URL:-http://meetino-api:4001}
      MEETINO_CLIENT_SECRET: ${MEETINO_CLIENT_SECRET:-}
      MEETINO_ALLOWED_REDIRECT_URLS: ${MEETINO_ALLOWED_REDIRECT_URLS:-https://meet.irnocollege.com/auth/irno/callback}
      MEETINO_SSO_CODE_TTL_SECONDS: ${MEETINO_SSO_CODE_TTL_SECONDS:-60}
      MEETINO_OPEN_IN_NEW_TAB: ${MEETINO_OPEN_IN_NEW_TAB:-true}
      # ⚠️  SUPER_ADMIN_* are only needed for the initial db:seed (first-deploy.sh).
      # Remove from environment after the first admin account is created.
      SUPER_ADMIN_MOBILE: ${SUPER_ADMIN_MOBILE:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
    volumes:
      # Persistent storage for Playwright-generated PDFs.
      # Mount point must match EXPORT_STORAGE_PATH above.
      - hub_pdf_exports:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irno_net

  hub-web:
    image: irno-hub-web:latest
    container_name: irno-hub-web
    restart: unless-stopped
    logging: *default-logging
    ports:
      # localhost-only — host Nginx proxies platform.irnocollege.com → this port.
      - "127.0.0.1:13000:3000"
    environment:
      NODE_ENV: production
      # Server-side runtime vars — NOT baked at build time.
      # NEXT_PUBLIC_* vars were passed as --build-arg to docker build.
      HUB_API_URL: http://hub-api:4000
      HUB_API_INTERNAL_URL: http://hub-api:4000
      CAREER_WEB_URL: https://cv.irnocollege.com
    depends_on:
      - hub-api
    networks:
      - irno_net

  career-web:
    image: irno-career-web:latest
    container_name: irno-career-web
    restart: unless-stopped
    logging: *default-logging
    ports:
      # localhost-only — host Nginx proxies cv.irnocollege.com → this port.
      - "127.0.0.1:13002:3002"
    environment:
      NODE_ENV: production
      # Server-side runtime var — NOT baked at build time.
      HUB_API_URL: http://hub-api:4000
    depends_on:
      - hub-api
    networks:
      - irno_net

  meetino-api:
    image: irno-meetino-api:latest
    container_name: irno-meetino-api
    restart: unless-stopped
    logging: *default-logging
    ports:
      # localhost-only — host Nginx proxies meet.irnocollege.com/api/ and /socket.io/
      - "127.0.0.1:14001:4001"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-irno}:${POSTGRES_PASSWORD}@postgres:5432/meetino_db?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_ACCESS_SECRET: ${MEETINO_JWT_ACCESS_SECRET:?MEETINO_JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${MEETINO_JWT_REFRESH_SECRET:?MEETINO_JWT_REFRESH_SECRET is required}
      API_PORT: "4001"
      WEB_ORIGIN: ${MEETINO_WEB_URL:-https://meet.irnocollege.com}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      # LIVEKIT_WS_URL is used by meetino-api for server-side token/API calls.
      # NEXT_PUBLIC_LIVEKIT_URL (baked in meetino-web image) is used by the browser.
      LIVEKIT_URL: ${LIVEKIT_WS_URL:?LIVEKIT_WS_URL is required}
      # SSO — set IRNO_HUB_SSO_ENABLED=true once both Hub and Meetino are live
      # and MEETINO_CLIENT_SECRET matches IRNO_HUB_CLIENT_SECRET on both sides.
      IRNO_HUB_SSO_ENABLED: ${IRNO_HUB_SSO_ENABLED:-false}
      # Server-to-server — internal compose network
      IRNO_HUB_API_URL: http://hub-api:4000
      IRNO_HUB_CLIENT_SECRET: ${MEETINO_CLIENT_SECRET:-}
      MEETING_MAX_PARTICIPANTS: ${MEETING_MAX_PARTICIPANTS:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irno_net

  meetino-web:
    image: irno-meetino-web:latest
    container_name: irno-meetino-web
    restart: unless-stopped
    logging: *default-logging
    ports:
      # localhost-only — host Nginx proxies meet.irnocollege.com → this port.
      # ⚠️  meetino-web Dockerfile exposes container port 3000 (not 3001).
      - "127.0.0.1:13001:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - meetino-api
    networks:
      - irno_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  hub_pdf_exports:
    driver: local

networks:
  irno_net:
    driver: bridge
