# ─────────────────────────────────────────────────────────────────────────────
# Irno Platform — Nginx Configuration (Production)
# Phase 22 — Security Hardening  |  Phase 10.3 — Docker Production Deployment
#
# Run as a Docker container on the irno_net network (see docker-compose.prod.yml).
# Per-domain HTTPS server blocks live in /etc/nginx/sites/*.conf (mounted read-only):
#   sites/hub.conf      → hub.irno.ir
#   sites/cv.conf       → cv.irno.ir
#   sites/meetino.conf  → meet.irno.ir
#
# Architecture:
#   :80  → ACME HTTP-01 challenge  +  301 → HTTPS
#   :443 → TLS termination → upstream Docker services by service name
#
# Upstream service names (Docker irno_net network):
#   hub-api      :4000  (NestJS)
#   hub-web      :3000  (Next.js standalone)
#   career-web   :3002  (Next.js standalone)
#   meetino-api  :4001  (NestJS)
#   meetino-web  :3000  (Next.js standalone — internal container port)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    # Includes real client IP forwarded by nginx to apps via X-Forwarded-For.
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    # ── Basic Security ─────────────────────────────────────────────────────────
    server_tokens  off;                    # Hide Nginx version in headers and error pages
    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout  65;
    gzip           on;
    gzip_types     text/plain text/css application/json application/javascript text/xml application/xml;

    # ── TLS ────────────────────────────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # ── Client Request Limits ──────────────────────────────────────────────────
    client_max_body_size    10m;    # Hard cap — app-level limits are tighter
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            10s;

    # ── Rate Limit Zones (Nginx-level, coarse — fine-grained done in NestJS) ──
    # Login / auth routes: 10 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;
    # OTP routes: 3 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=otp:10m    rate=3r/m;
    # API general: 200 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=200r/m;
    # Static assets: higher limit
    limit_req_zone  $binary_remote_addr  zone=static:10m rate=500r/m;
    # Upload endpoints: 5 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=upload:10m rate=5r/m;

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS Redirect  +  ACME HTTP-01 challenge
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen  80;
        server_name  _;

        # Let's Encrypt ACME challenge — must be accessible over HTTP
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            return  301  https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Per-domain HTTPS server blocks
    # Each file configures one domain with its own cert + proxy rules.
    # ─────────────────────────────────────────────────────────────────────────
    include  /etc/nginx/sites/*.conf;
}
