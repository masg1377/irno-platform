# ─────────────────────────────────────────────────────────────────────────────
# Irno Platform — Nginx Security Configuration (Production Preparation)
# Phase 22 — Security Hardening, Abuse Control, Production Safety
#
# IMPORTANT: This file is PREPARED but NOT deployed.
# Activate as part of Phase 10 Production Deployment.
#
# Architecture (single VPS):
#   443 → TLS termination → upstream NestJS/Next.js apps
#   80  → 301 redirect to HTTPS
#
# Upstreams (docker network or local sockets):
#   hub-api   → localhost:4000  (NestJS)
#   hub-web   → localhost:3000  (Next.js)
#   career-web→ localhost:3002  (Next.js)
#   meetino-web → localhost:3001 (Next.js)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    # Include real client IP (forwarded by Nginx to apps via X-Forwarded-For).
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    # ── Basic Security ─────────────────────────────────────────────────────────
    server_tokens  off;                    # Hide Nginx version in headers and error pages
    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout  65;
    gzip           on;
    gzip_types     text/plain text/css application/json application/javascript text/xml application/xml;

    # ── TLS ────────────────────────────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # ── Client Request Limits ──────────────────────────────────────────────────
    client_max_body_size    10m;    # Hard cap on all uploads — apps enforce tighter limits
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            10s;

    # ── Rate Limit Zones (Nginx-level, coarse — fine-grained done in NestJS) ──
    # Login / auth routes: 10 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;
    # OTP routes: 3 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=otp:10m    rate=3r/m;
    # API general: 200 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=200r/m;
    # Static assets: higher limit
    limit_req_zone  $binary_remote_addr  zone=static:10m rate=500r/m;
    # Upload endpoints: 5 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=upload:10m rate=5r/m;

    # ── Shared Security Headers ────────────────────────────────────────────────
    # Applied to all server blocks via include or inline.
    # Each server block can override specific headers.

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS Redirect
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen  80;
        server_name  _;

        # Allow ACME HTTP-01 challenge for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            return  301  https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Hub Web (Irno Hub Admin + Irno ID)
    # Domain: hub.irno.academy (example — set actual domain in production)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen       443  ssl;
        server_name  hub.irno.academy;

        ssl_certificate      /etc/letsencrypt/live/hub.irno.academy/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/hub.irno.academy/privkey.pem;

        # Security headers (Nginx-level for non-Next.js paths / error pages)
        add_header  X-Content-Type-Options       "nosniff"                          always;
        add_header  X-Frame-Options              "DENY"                             always;
        add_header  Referrer-Policy              "strict-origin-when-cross-origin"  always;
        add_header  Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header  Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
        add_header  X-XSS-Protection             "1; mode=block"                    always;

        # Auth endpoints — strict rate limit
        location ~* ^/api/v1/auth/(login|register|otp) {
            limit_req  zone=auth  burst=5  nodelay;
            proxy_pass  http://127.0.0.1:4000;
            include     /etc/nginx/proxy_params.conf;
        }

        # Upload endpoints — upload rate limit
        location ~* ^/api/v1/career/(checker/upload|job-match/upload) {
            limit_req        zone=upload  burst=2  nodelay;
            client_max_body_size  6m;
            proxy_pass  http://127.0.0.1:4000;
            include     /etc/nginx/proxy_params.conf;
        }

        # API — general rate limit
        location /api/ {
            limit_req  zone=api  burst=50  nodelay;
            proxy_pass  http://127.0.0.1:4000;
            include     /etc/nginx/proxy_params.conf;
        }

        # Next.js static assets
        location /_next/static/ {
            limit_req  zone=static  burst=100  nodelay;
            proxy_pass  http://127.0.0.1:3000;
            include     /etc/nginx/proxy_params.conf;
            expires     1y;
            add_header  Cache-Control  "public, immutable";
        }

        # Everything else → hub-web Next.js
        location / {
            limit_req  zone=api  burst=30  nodelay;
            proxy_pass  http://127.0.0.1:3000;
            include     /etc/nginx/proxy_params.conf;
        }

        # Custom error pages (no stack trace exposure)
        error_page  404              /404;
        error_page  500  502  503  504  /50x;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Career Web (Irno Career Studio / Irno CV)
    # Domain: cv.irno.academy (example — set actual domain in production)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen       443  ssl;
        server_name  cv.irno.academy;

        ssl_certificate      /etc/letsencrypt/live/cv.irno.academy/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/cv.irno.academy/privkey.pem;

        add_header  X-Content-Type-Options       "nosniff"                          always;
        # SAMEORIGIN to allow the in-editor iframe preview
        add_header  X-Frame-Options              "SAMEORIGIN"                       always;
        add_header  Referrer-Policy              "strict-origin-when-cross-origin"  always;
        add_header  Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header  Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;

        # PDF download endpoint — cache briefly, no inline display
        location ~* ^/api/v1/career/resumes/.+/exports/.+/download {
            limit_req  zone=api  burst=5  nodelay;
            proxy_pass  http://127.0.0.1:4000;
            include     /etc/nginx/proxy_params.conf;
            # Force download, not inline (defence-in-depth, app also sets this)
            add_header  Content-Disposition  "attachment" always;
        }

        # Public profile + project pages — relaxed limit, publicly accessible
        location ~* ^/public/ {
            limit_req  zone=api  burst=60  nodelay;
            proxy_pass  http://127.0.0.1:3002;
            include     /etc/nginx/proxy_params.conf;
        }

        location /_next/static/ {
            limit_req  zone=static  burst=100  nodelay;
            proxy_pass  http://127.0.0.1:3002;
            include     /etc/nginx/proxy_params.conf;
            expires     1y;
            add_header  Cache-Control  "public, immutable";
        }

        location / {
            limit_req  zone=api  burst=30  nodelay;
            proxy_pass  http://127.0.0.1:3002;
            include     /etc/nginx/proxy_params.conf;
        }

        error_page  404              /404;
        error_page  500  502  503  504  /50x;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Meetino Web (Online Classroom)
    # Domain: meetino.irno.academy (example)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen       443  ssl;
        server_name  meetino.irno.academy;

        ssl_certificate      /etc/letsencrypt/live/meetino.irno.academy/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/meetino.irno.academy/privkey.pem;

        add_header  X-Content-Type-Options       "nosniff"                          always;
        add_header  X-Frame-Options              "SAMEORIGIN"                       always;
        add_header  Referrer-Policy              "strict-origin-when-cross-origin"  always;
        # camera + microphone required for video meetings
        add_header  Permissions-Policy           "camera=(self), microphone=(self), geolocation=(), payment=(), usb=()" always;
        add_header  Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;

        # WebSocket proxy for LiveKit/Socket.IO (meeting real-time)
        location /socket.io/ {
            proxy_pass          http://127.0.0.1:3001;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade     $http_upgrade;
            proxy_set_header    Connection  "upgrade";
            proxy_set_header    Host        $host;
            proxy_set_header    X-Real-IP   $remote_addr;
            proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout  3600s;   # keep WS alive for long meetings
        }

        # Meetino API — NestJS on port 4001
        location /api/ {
            limit_req  zone=api  burst=30  nodelay;
            proxy_pass  http://127.0.0.1:4001;
            include     /etc/nginx/proxy_params.conf;
        }

        location /_next/static/ {
            limit_req  zone=static  burst=100  nodelay;
            proxy_pass  http://127.0.0.1:3001;
            include     /etc/nginx/proxy_params.conf;
            expires     1y;
            add_header  Cache-Control  "public, immutable";
        }

        location / {
            limit_req  zone=api  burst=30  nodelay;
            proxy_pass  http://127.0.0.1:3001;
            include     /etc/nginx/proxy_params.conf;
        }

        error_page  404              /404;
        error_page  500  502  503  504  /50x;
    }
}
