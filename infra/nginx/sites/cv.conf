# ─────────────────────────────────────────────────────────────────────────────
# Irno Career Studio (Irno CV) — cv.irnocollege.com
#
# Serves:
#   /api/*              → hub-api:4000   (career endpoints live in hub-api)
#   /public/*           → career-web:3002 (public live resume pages)
#   /_next/static/*     → career-web:3002 (Next.js static assets)
#   /                   → career-web:3002 (Next.js app — studio + landing)
#
# X-Frame-Options is SAMEORIGIN (not DENY) to allow the in-editor
# iframe preview panel that renders a live A4 resume inside the studio.
#
# Proxy addresses use Docker service names on the irno_net network.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       443 ssl;
    server_name  cv.irnocollege.com;

    ssl_certificate      /etc/letsencrypt/live/cv.irnocollege.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/cv.irnocollege.com/privkey.pem;

    # SAMEORIGIN required for the resume editor iframe preview
    add_header  X-Content-Type-Options     "nosniff"                          always;
    add_header  X-Frame-Options            "SAMEORIGIN"                       always;
    add_header  Referrer-Policy            "strict-origin-when-cross-origin"  always;
    add_header  Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;

    # ── PDF download — force attachment (defence-in-depth) ───────────────────
    location ~* ^/api/v1/career/resumes/.+/exports/.+/download {
        limit_req   zone=api  burst=5  nodelay;
        proxy_pass  http://hub-api:4000;
        include     /etc/nginx/proxy_params.conf;
        add_header  Content-Disposition  "attachment" always;
    }

    # ── Public resume download (unauthenticated) ─────────────────────────────
    location ~* ^/api/v1/career/public/.+/resume/download {
        limit_req   zone=api  burst=20  nodelay;
        proxy_pass  http://hub-api:4000;
        include     /etc/nginx/proxy_params.conf;
        add_header  Content-Disposition  "attachment" always;
    }

    # ── Upload endpoints ──────────────────────────────────────────────────────
    location ~* ^/api/v1/career/(checker/upload|job-match/upload) {
        limit_req              zone=upload  burst=2  nodelay;
        client_max_body_size   6m;
        proxy_pass             http://hub-api:4000;
        include                /etc/nginx/proxy_params.conf;
    }

    # ── All other API requests (career + hub shared API) ─────────────────────
    location /api/ {
        limit_req   zone=api  burst=50  nodelay;
        proxy_pass  http://hub-api:4000;
        include     /etc/nginx/proxy_params.conf;
    }

    # ── Public live resume pages — higher burst (SEO-crawlable) ──────────────
    location ~* ^/(public|u)/ {
        limit_req   zone=api  burst=60  nodelay;
        proxy_pass  http://career-web:3002;
        include     /etc/nginx/proxy_params.conf;
    }

    # ── Next.js immutable static chunks ──────────────────────────────────────
    location /_next/static/ {
        limit_req   zone=static  burst=100  nodelay;
        proxy_pass  http://career-web:3002;
        include     /etc/nginx/proxy_params.conf;
        expires     1y;
        add_header  Cache-Control  "public, immutable";
    }

    # ── Everything else → career-web (Next.js) ───────────────────────────────
    location / {
        limit_req   zone=api  burst=30  nodelay;
        proxy_pass  http://career-web:3002;
        include     /etc/nginx/proxy_params.conf;
    }

    error_page  404              /404;
    error_page  500 502 503 504  /50x;
}
