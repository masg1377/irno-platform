# ─────────────────────────────────────────────────────────────────────────────
# Meetino (Online Classroom) — meet.irno.ir
#
# Serves:
#   /socket.io/     → meetino-api:4001  (NestJS WebSocket / Socket.IO gateway)
#   /api/*          → meetino-api:4001  (NestJS REST API)
#   /_next/static/* → meetino-web:3000  (Next.js static assets)
#   /               → meetino-web:3000  (Next.js app)
#
# meetino-web container listens on port 3000 internally (Next.js default).
# The host-level port 3001 used in dev is not present in production —
# all traffic arrives through this nginx block.
#
# camera + microphone permissions are ENABLED (required for video meetings).
# X-Frame-Options is SAMEORIGIN (meeting iframe embedding may be needed).
#
# Proxy addresses use Docker service names on the irno_net network.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       443 ssl;
    server_name  meet.irno.ir;

    ssl_certificate      /etc/letsencrypt/live/meet.irno.ir/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/meet.irno.ir/privkey.pem;

    add_header  X-Content-Type-Options     "nosniff"                          always;
    # SAMEORIGIN — meeting embed / screen-share may require this
    add_header  X-Frame-Options            "SAMEORIGIN"                       always;
    add_header  Referrer-Policy            "strict-origin-when-cross-origin"  always;
    # camera + microphone explicitly required for video meetings
    add_header  Permissions-Policy         "camera=(self), microphone=(self), geolocation=(), payment=(), usb=()" always;
    add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;

    # ── WebSocket — Socket.IO real-time gateway (NestJS meetino-api) ─────────
    # Uses separate proxy headers to support WebSocket upgrade.
    # proxy_params.conf is NOT included here (it clears the Connection header).
    location /socket.io/ {
        proxy_pass          http://meetino-api:4001;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          "upgrade";
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_read_timeout  3600s;  # keep WS alive for long meetings
    }

    # ── Meetino API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req   zone=api  burst=30  nodelay;
        proxy_pass  http://meetino-api:4001;
        include     /etc/nginx/proxy_params.conf;
    }

    # ── Next.js immutable static chunks ──────────────────────────────────────
    location /_next/static/ {
        limit_req   zone=static  burst=100  nodelay;
        proxy_pass  http://meetino-web:3000;
        include     /etc/nginx/proxy_params.conf;
        expires     1y;
        add_header  Cache-Control  "public, immutable";
    }

    # ── Everything else → meetino-web (Next.js) ───────────────────────────────
    location / {
        limit_req   zone=api  burst=30  nodelay;
        proxy_pass  http://meetino-web:3000;
        include     /etc/nginx/proxy_params.conf;
    }

    error_page  404              /404;
    error_page  500 502 503 504  /50x;
}
