# ─────────────────────────────────────────────────────────────────────────────
# Irno Hub Web — hub.irno.ir
#
# Serves:
#   /api/*        → hub-api:4000   (NestJS REST API)
#   /_next/static → hub-web:3000   (Next.js static assets, long-lived cache)
#   /             → hub-web:3000   (Next.js app — admin + student portal + Irno ID)
#
# Proxy addresses use Docker service names on the irno_net network.
# Rate-limit zones (auth, otp, api, upload, static) are defined in nginx.conf.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       443 ssl;
    server_name  hub.irno.ir;

    ssl_certificate      /etc/letsencrypt/live/hub.irno.ir/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/hub.irno.ir/privkey.pem;

    # Security headers (defence-in-depth; Next.js also sets these)
    add_header  X-Content-Type-Options     "nosniff"                          always;
    add_header  X-Frame-Options            "DENY"                             always;
    add_header  Referrer-Policy            "strict-origin-when-cross-origin"  always;
    add_header  Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header  X-XSS-Protection           "1; mode=block"                    always;

    # ── Auth endpoints — strict rate limit ───────────────────────────────────
    location ~* ^/api/v1/auth/(login|register|otp) {
        limit_req   zone=auth  burst=5  nodelay;
        proxy_pass  http://hub-api:4000;
        include     /etc/nginx/proxy_params.conf;
    }

    # ── Upload endpoints ──────────────────────────────────────────────────────
    location ~* ^/api/v1/career/(checker/upload|job-match/upload) {
        limit_req              zone=upload  burst=2  nodelay;
        client_max_body_size   6m;
        proxy_pass             http://hub-api:4000;
        include                /etc/nginx/proxy_params.conf;
    }

    # ── All other API requests ────────────────────────────────────────────────
    location /api/ {
        limit_req   zone=api  burst=50  nodelay;
        proxy_pass  http://hub-api:4000;
        include     /etc/nginx/proxy_params.conf;
    }

    # ── Next.js immutable static chunks (1-year cache) ───────────────────────
    location /_next/static/ {
        limit_req   zone=static  burst=100  nodelay;
        proxy_pass  http://hub-web:3000;
        include     /etc/nginx/proxy_params.conf;
        expires     1y;
        add_header  Cache-Control  "public, immutable";
    }

    # ── Everything else → hub-web (Next.js) ──────────────────────────────────
    location / {
        limit_req   zone=api  burst=30  nodelay;
        proxy_pass  http://hub-web:3000;
        include     /etc/nginx/proxy_params.conf;
    }

    # No stack traces exposed via nginx error pages
    error_page  404              /404;
    error_page  500 502 503 504  /50x;
}
