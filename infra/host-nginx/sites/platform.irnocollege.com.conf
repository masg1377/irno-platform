# ─────────────────────────────────────────────────────────────────────────────
# platform.irnocollege.com — Hub Web + Hub API
#
# HTTP config for initial Certbot certificate issuance.
# After running certbot --nginx, Certbot rewrites this file to add the HTTPS
# redirect server block and the SSL listener with certificate paths.
#
# Upstreams:
#   /api/  → hub-api   (127.0.0.1:14000)
#   /      → hub-web   (127.0.0.1:13000)
#
# Install:
#   sudo cp platform.irnocollege.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/platform.irnocollege.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

upstream hub_api {
    server 127.0.0.1:14000;
    keepalive 32;
}

upstream hub_web {
    server 127.0.0.1:13000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name platform.irnocollege.com;

    # Certbot ACME HTTP-01 challenge (webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Hub API — all /api/ requests proxy to hub-api
    location /api/ {
        proxy_pass http://hub_api;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Hub Web — all other requests proxy to hub-web (Next.js standalone)
    location / {
        proxy_pass http://hub_web;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
    }
}
