# ─────────────────────────────────────────────────────────────────────────────
# cv.irnocollege.com — Career Web + Hub API
#
# HTTP config for initial Certbot certificate issuance.
# After running certbot --nginx, Certbot rewrites this file to add the HTTPS
# redirect server block and the SSL listener with certificate paths.
#
# Upstreams:
#   /api/  → hub-api     (127.0.0.1:14000)   — career-web proxies API calls here
#   /      → career-web  (127.0.0.1:13002)
#
# Install:
#   sudo cp cv.irnocollege.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/cv.irnocollege.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

upstream hub_api_cv {
    server 127.0.0.1:14000;
    keepalive 32;
}

upstream career_web {
    server 127.0.0.1:13002;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name cv.irnocollege.com;

    # Certbot ACME HTTP-01 challenge (webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Hub API — career-web Next.js proxy and client-side fetch both use /api/
    location /api/ {
        proxy_pass http://hub_api_cv;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
        # PDF downloads can be large; allow generous body size
        client_max_body_size 10m;
    }

    # Career Web — all other requests proxy to career-web (Next.js standalone)
    location / {
        proxy_pass http://career_web;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
    }
}
