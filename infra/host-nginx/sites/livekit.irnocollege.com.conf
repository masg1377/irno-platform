# ─────────────────────────────────────────────────────────────────────────────
# livekit.irnocollege.com — LiveKit API / WebSocket endpoint
#
# HTTP config for initial Certbot certificate issuance.
# After running certbot --nginx, Certbot rewrites this file to add the HTTPS
# redirect server block and the SSL listener with certificate paths.
#
# Purpose: Proxies WebSocket connections from the meetino-web browser client to
# the LiveKit server container (wss://livekit.irnocollege.com → 127.0.0.1:7880).
# Also used by meetino-api for server-side token/API calls to LiveKit.
#
# ⚠️  LiveKit WebRTC MEDIA ports (7881/tcp, 7882/udp) bypass Nginx entirely —
#     they are published directly on the host. Only the signaling WebSocket
#     and HTTP API go through Nginx.
#
# Install:
#   sudo cp livekit.irnocollege.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/livekit.irnocollege.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

upstream livekit_api {
    server 127.0.0.1:7880;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name livekit.irnocollege.com;

    # Certbot ACME HTTP-01 challenge (webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # All traffic (WebSocket signaling + HTTP API) proxied to LiveKit
    location / {
        proxy_pass http://livekit_api;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — required for LiveKit signaling
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        include /etc/nginx/proxy_params.conf;

        # LiveKit WebSocket connections are long-lived (full meeting duration).
        # Do not impose a short read timeout — use 1 hour.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable response buffering — LiveKit is a streaming protocol.
        proxy_buffering off;
        proxy_cache off;

        # Allow large body for file/media uploads routed through the API
        client_max_body_size 30m;
    }
}
