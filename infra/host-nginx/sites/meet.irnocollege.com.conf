# ─────────────────────────────────────────────────────────────────────────────
# meet.irnocollege.com — Meetino Web + Meetino API
#
# HTTP config for initial Certbot certificate issuance.
# After running certbot --nginx, Certbot rewrites this file to add the HTTPS
# redirect server block and the SSL listener with certificate paths.
#
# Upstreams:
#   /socket.io/   → meetino-api  (127.0.0.1:14001)  — WebSocket upgrade required
#   /api/         → meetino-api  (127.0.0.1:14001)
#   /             → meetino-web  (127.0.0.1:13001)
#
# ⚠️  The /socket.io/ block MUST come before /api/ — Nginx evaluates location
#     blocks by longest prefix match, and socket.io uses /socket.io/ path.
#
# Install:
#   sudo cp meet.irnocollege.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/meet.irnocollege.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

upstream meetino_api {
    server 127.0.0.1:14001;
    keepalive 32;
}

upstream meetino_web {
    server 127.0.0.1:13001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name meet.irnocollege.com;

    # Certbot ACME HTTP-01 challenge (webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Socket.IO — WebSocket connections for real-time meeting events.
    # Must use HTTP/1.1 and Upgrade headers; long read timeout for persistent connections.
    location /socket.io/ {
        proxy_pass http://meetino_api;
        include /etc/nginx/proxy_params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Socket.IO connections are long-lived; do not time them out prematurely.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Meetino API — REST + auth endpoints
    location /api/ {
        proxy_pass http://meetino_api;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
        client_max_body_size 30m;
    }

    # Meetino Web — all other requests proxy to meetino-web (Next.js standalone)
    location / {
        proxy_pass http://meetino_web;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
    }
}
