name: CI

# Run on every push to main and on every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── NEXT_PUBLIC_* env vars ────────────────────────────────────────────────────
# Next.js bakes NEXT_PUBLIC_* values into the JS bundle at `next build` time.
# Without them the build still succeeds but runtime URLs would be `undefined`.
# We use dummy localhost values here — they are NOT secrets.
env:
  NEXT_PUBLIC_API_URL: http://localhost:4000
  NEXT_PUBLIC_HUB_WEB_URL: http://localhost:3000
  NEXT_PUBLIC_CAREER_WEB_URL: http://localhost:3002
  NEXT_PUBLIC_MEETINO_CALLBACK_URL: http://localhost:3001/auth/irno/callback
  NEXT_PUBLIC_IRNO_SSO_ENABLED: "false"
  NEXT_PUBLIC_IRNO_HUB_WEB_URL: http://localhost:3000
  NEXT_PUBLIC_IRNO_ID_URL: http://localhost:3000
  NEXT_PUBLIC_MEETINO_APP_ID: meetino

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── pnpm ────────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      # ── Node 22 + pnpm cache ────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # ── Turbo remote cache (local disk cache) ───────────────────────────────
      # Turborepo uses the .turbo directory to cache task outputs across runs.
      # Restoring it avoids rebuilding unchanged packages on every push.
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # ── Install dependencies ─────────────────────────────────────────────────
      # --frozen-lockfile: CI must never silently upgrade packages.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build shared packages ────────────────────────────────────────────────
      # All apps import from packages/*/dist (compiled TypeScript).
      # The turbo pipeline has "typecheck": { "dependsOn": ["^build"] } which
      # handles this automatically when run through `turbo run typecheck`.
      # However, running pnpm --filter <app> typecheck directly skips turbo's
      # dependency ordering — so we build packages explicitly here.
      - name: Build shared packages
        run: pnpm turbo run build --filter="./packages/*"

      # ── Prisma client generation ─────────────────────────────────────────────
      # `prisma generate` reads the schema and writes TypeScript types into
      # node_modules/.prisma/client. It does NOT need a database connection.
      # Without this step, any file importing from @prisma/client fails tsc.

      - name: Generate Prisma client — hub-api
        run: pnpm --filter @irno/hub-api db:generate

      - name: Generate Prisma client — meetino-api
        run: pnpm --filter @irno/meetino-api prisma:generate

      # ─────────────────────────────────────────────────────────────────────────
      # TYPECHECK
      # ─────────────────────────────────────────────────────────────────────────

      - name: Typecheck hub-api
        run: pnpm --filter @irno/hub-api typecheck

      - name: Typecheck hub-web
        run: pnpm --filter @irno/hub-web typecheck

      - name: Typecheck career-web
        run: pnpm --filter @irno/career-web typecheck

      - name: Typecheck meetino-api
        run: pnpm --filter @irno/meetino-api typecheck

      - name: Typecheck meetino-web
        run: pnpm --filter @irno/meetino-web typecheck

      # ─────────────────────────────────────────────────────────────────────────
      # BUILD
      # ─────────────────────────────────────────────────────────────────────────
      # NestJS apps: `nest build` — produces dist/
      # Next.js apps: `next build` — produces .next/

      - name: Build hub-api
        run: pnpm --filter @irno/hub-api build

      - name: Build hub-web
        run: pnpm --filter @irno/hub-web build

      - name: Build career-web
        run: pnpm --filter @irno/career-web build

      - name: Build meetino-api
        run: pnpm --filter @irno/meetino-api build

      - name: Build meetino-web
        run: pnpm --filter @irno/meetino-web build
